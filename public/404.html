<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — DIT Report</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
:root {
  --bg: #0e1117; --surface: #161b22; --border: #30363d;
  --text: #e6edf3; --text-dim: #8b949e; --accent: #e8762b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
  color: var(--text); min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 50% 30%, #1a1f2e 0%, var(--bg) 70%),
    radial-gradient(circle, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: 100% 100%, 24px 24px;
}
.error-card {
  text-align: center; max-width: 400px; padding: 48px 32px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.4);
}
.error-code {
  font-size: 72px; font-weight: 800; color: var(--accent);
  line-height: 1; margin-bottom: 8px;
}
h1 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
p { color: var(--text-dim); font-size: 14px; line-height: 1.5; margin-bottom: 24px; }
a {
  display: inline-block; padding: 10px 24px; background: var(--accent);
  color: #fff; text-decoration: none; font-size: 14px; font-weight: 600;
  border-radius: 6px; transition: opacity .15s;
}
a:hover { opacity: .85; }
</style>
</head>
<body>
<div class="error-card">
  <div class="error-code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="/">Go to Dashboard</a>
</div>
</body>
</html>
