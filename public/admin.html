<style>
:root {
  --bg: #0e1117; --surface: #161b22; --surface2: #1c2333; --border: #30363d;
  --text: #e6edf3; --text-dim: #8b949e; --accent: #e8762b; --accent2: #3fb950;
  --accent3: #d29922; --danger: #f85149; --radius: 10px; --shadow: 0 2px 12px rgba(0,0,0,.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* Nav */
.nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
.nav h1 { font-size: 16px; font-weight: 700; }
.nav .breadcrumb { color: var(--text-dim); font-size: 13px; }
.nav .breadcrumb a { color: var(--accent); text-decoration: none; }

/* Cards */

.card h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

/* Project cards */
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.project-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: border-color .15s, transform .15s; box-shadow: var(--shadow); position: relative; cursor: pointer; }
.project-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.project-card h3 { font-size: 18px; margin-bottom: 4px; color: var(--text); text-transform: none; letter-spacing: 0; }
.project-card .meta { color: var(--text-dim); font-size: 13px; margin-bottom: 12px; }
.project-card .stats { display: flex; gap: 16px; font-size: 12px; color: var(--text-dim); }
.project-card .stats strong { color: var(--text); }
.project-card .card-actions { display: flex; gap: 8px; margin-top: 14px; align-items: center; }
.edit-link { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none; }
.edit-link:hover { text-decoration: underline; }
.edit-link svg { width: 14px; height: 14px; }
.project-card .view-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-dim); font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none; }

/* Ellipsis menu */
.ellipsis-wrap { position: relative; margin-left: auto; }
.ellipsis-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 20px; padding: 4px 8px; border-radius: 4px; line-height: 1; letter-spacing: 2px; }
.ellipsis-btn:hover { background: var(--surface2); color: var(--text); }
.ellipsis-menu { position: absolute; right: 0; top: 100%; margin-top: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow); min-width: 160px; z-index: 50; display: none; overflow: hidden; }
.ellipsis-menu.open { display: block; }
.ellipsis-menu button { display: block; width: 100%; text-align: left; background: none; border: none; color: var(--text); padding: 10px 16px; font-size: 13px; cursor: pointer; font-family: inherit; }
.ellipsis-menu button:hover { background: var(--surface2); }
.ellipsis-menu button.danger { color: var(--danger); }

.ellipsis-menu .menu-divider { height: 1px; background: var(--border); margin: 4px 0; }

.dashboard-section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }

/* Forms */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
input.mono, .mono-input { font-family: 'SF Mono','Menlo', monospace; font-size: 12px; }
input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent2); cursor: pointer; padding: 0; }
input.invalid { border-color: var(--danger); }

/* Buttons */
.btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }

.btn-danger:hover { background: rgba(248,81,73,.1); border-color: var(--danger); }

.data-table tr:last-child td { border-bottom: none; }

.data-table input[type="checkbox"] { width: 18px; min-width: 18px; }
.data-table .row-actions { white-space: nowrap; }

/* Section headers */
.section-title { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; margin-top: 24px; }
.section-title h3 { margin: 0; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-dim); }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Camera cards in admin */
.admin-camera-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
.admin-camera-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; position: relative; }
.admin-camera-card .brand-logo { position: absolute; top: 14px; right: 52px; height: 20px; width: auto; opacity: 0.25; pointer-events: none; filter: brightness(0) invert(1); }
.admin-camera-card .brand-blackmagic { height: 52px; top: 0px; }
.admin-camera-card .source-type-badge { display: inline-block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; padding: 2px 8px; border-radius: 4px; margin-bottom: 8px; }
.source-type-badge.type-camera { background: rgba(88,166,255,.12); color: #58a6ff; }
.source-type-badge.type-audio { background: rgba(232,118,43,.12); color: #e8762b; }
.source-type-badge.type-photo { background: rgba(163,113,247,.12); color: #a371f7; }
.source-type-badge.type-misc { background: rgba(210,153,34,.12); color: #d29922; }
.source-picker { position: fixed; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow); min-width: 180px; z-index: 200; overflow: hidden; }
.source-picker button { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; background: none; border: none; color: var(--text); padding: 10px 16px; font-size: 13px; cursor: pointer; font-family: inherit; }
.source-picker button:hover { background: var(--surface2); }
.admin-camera-card > .ellipsis-wrap { position: absolute; top: 8px; right: 8px; margin-left: 0; z-index: 10; }
.admin-camera-card > .ellipsis-wrap .ellipsis-menu { z-index: 100; }
.admin-camera-card .cam-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.admin-camera-card .cam-form .full { grid-column: 1 / -1; }
.admin-camera-card .cam-form .form-group label { margin-bottom: 4px; }
.admin-camera-card .cam-form input { width: 100%; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--accent2); color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(10px); transition: all .3s; pointer-events: none; z-index: 100; }
.toast.show { opacity: 1; transform: translateY(0); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .15s; }
.modal-overlay.show { opacity: 1; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; min-width: 360px; max-width: 480px; width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,.5); transform: scale(.95); transition: transform .15s; }
.modal-overlay.show .modal { transform: scale(1); }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text); text-transform: none; letter-spacing: 0; }
.modal p { font-size: 14px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; }
.modal input { width: 100%; margin-bottom: 20px; }
.modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal .modal-actions .btn { min-width: 80px; text-align: center; }

/* Totals bar */
.totals-bar { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; display: flex; gap: 32px; font-size: 13px; margin-top: 12px; }
.totals-bar .t-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 600; }
.totals-bar .t-value { font-weight: 700; font-family: 'SF Mono', monospace; }

/* Summary row */
.summary-row td { font-weight: 700; background: var(--surface2); border-top: 2px solid var(--border); }

/* Auth loading */
.auth-loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; color: var(--text-dim); font-size: 14px; }

/* User menu */
.user-menu { display: flex; align-items: center; gap: 10px; }
.user-menu .user-avatar { width: 28px; height: 28px; border-radius: 50%; }
.user-menu .user-name { font-size: 13px; color: var(--text); font-weight: 500; }
.user-menu .sign-out-btn { background: none; border: none; color: var(--text-dim); font-size: 12px; cursor: pointer; padding: 4px 8px; border-radius: 4px; font-family: inherit; }
.user-menu .sign-out-btn:hover { color: var(--text); background: var(--surface2); }
.admin-link { color: var(--text-dim); font-size: 13px; text-decoration: none; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); display: inline-flex; align-items: center; gap: 6px; }
.admin-link:hover { color: var(--text); border-color: var(--accent); }

/* Impersonation banner */
.impersonate-banner { background: var(--accent3); color: #000; padding: 8px 24px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 12px; }
.impersonate-banner button { background: rgba(0,0,0,.2); border: none; color: #000; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; }
.impersonate-banner button:hover { background: rgba(0,0,0,.3); }

/* Admin tables */
.admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.admin-table th { text-align: left; padding: 10px 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 600; border-bottom: 1px solid var(--border); background: var(--surface2); }
.admin-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.admin-table tr:last-child td { border-bottom: none; }
.admin-table tr:hover td { background: var(--surface2); }
.admin-table .actions { white-space: nowrap; display: flex; gap: 6px; }

@media (max-width: 768px) {
  .form-grid { grid-template-columns: 1fr; }
  .form-grid.cols-3, .form-grid.cols-4 { grid-template-columns: 1fr 1fr; }
  .projects-grid { grid-template-columns: 1fr; }
}
</style>

<body>
<div id="app"><div class="auth-loading">Loading...</div></div>
<div class="toast" id="toast"></div>

<script>
const API = '/api';
let currentUser = null;
let impersonatingUserId = null;

// ===== Auth =====
window.addEventListener('load', async () => {
  await window.Clerk.load();
  if (!window.Clerk.user) {
    window.location.href = '/login.html';
    return;
  }
  // Fetch current user info
  currentUser = await api('/me');
  render();
});

// ===== Utilities =====
async function api(path, opts = {}) {
  const token = await window.Clerk.session.getToken();
  const headers = {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token}`,
    ...opts.headers,
  };
  if (impersonatingUserId) {
    headers['x-impersonate-user'] = impersonatingUserId;
  }
  const res = await fetch(API + path, {
    ...opts,
    headers,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  return res.json();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// Custom modal system
function showModal(html) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  document.body.appendChild(overlay);
  requestAnimationFrame(() => overlay.classList.add('show'));
  return overlay;
}

function closeModal(overlay) {
  overlay.classList.remove('show');
  setTimeout(() => overlay.remove(), 150);
}

function modalPrompt(title, defaultValue = '') {
  return new Promise(resolve => {
    const overlay = showModal(`
      <h3>${esc(title)}</h3>
      <input type="text" class="modal-input" value="${esc(defaultValue)}" autofocus>
      <div class="modal-actions">
        <button class="btn modal-cancel">Cancel</button>
        <button class="btn btn-primary modal-ok">OK</button>
      </div>
    `);
    const input = overlay.querySelector('.modal-input');
    const ok = () => { const v = input.value; closeModal(overlay); resolve(v || null); };
    const cancel = () => { closeModal(overlay); resolve(null); };
    overlay.querySelector('.modal-ok').addEventListener('click', ok);
    overlay.querySelector('.modal-cancel').addEventListener('click', cancel);
    overlay.addEventListener('click', e => { if (e.target === overlay) cancel(); });
    input.addEventListener('keydown', e => { if (e.key === 'Enter') ok(); if (e.key === 'Escape') cancel(); });
    input.focus();
    input.select();
  });
}

function modalConfirm(message) {
  return new Promise(resolve => {
    const overlay = showModal(`
      <h3>Are you sure?</h3>
      <p>${esc(message)}</p>
      <div class="modal-actions">
        <button class="btn modal-cancel">Cancel</button>
        <button class="btn btn-danger modal-ok">Delete</button>
      </div>
    `);
    overlay.querySelector('.modal-ok').addEventListener('click', () => { closeModal(overlay); resolve(true); });
    overlay.querySelector('.modal-cancel').addEventListener('click', () => { closeModal(overlay); resolve(false); });
    overlay.addEventListener('click', e => { if (e.target === overlay) { closeModal(overlay); resolve(false); } });
    document.addEventListener('keydown', function handler(e) {
      if (e.key === 'Escape') { document.removeEventListener('keydown', handler); closeModal(overlay); resolve(false); }
      if (e.key === 'Enter') { document.removeEventListener('keydown', handler); closeModal(overlay); resolve(true); }
    });
  });
}

function navigate(hash) {
  window.location.hash = hash;
}

function fmtNum(n) { return Number(n||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtInt(n) { return Number(n||0).toLocaleString('en-US'); }

function formatDate(d) {
  if (!d) return '';
  return new Date(d+'T00:00:00').toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
}

// Debounce for auto-save
function debounce(fn, ms = 500) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

// ===== Router =====
function getRoute() {
  const h = window.location.hash.slice(1) || '/';
  const projMatch = h.match(/^\/project\/(\d+)$/);
  const dayMatch = h.match(/^\/project\/(\d+)\/day\/(\d+)$/);
  if (h === '/admin/users') return { page: 'admin-users' };
  if (dayMatch) return { page: 'day', projectId: dayMatch[1], dayId: dayMatch[2] };
  if (projMatch) return { page: 'project', projectId: projMatch[1] };
  return { page: 'dashboard' };
}

window.addEventListener('hashchange', render);

// ===== Render =====
async function render() {
  if (!window.Clerk || !window.Clerk.user) return;
  const route = getRoute();
  const app = document.getElementById('app');
  try {
    if (route.page === 'admin-users') await renderAdminUsers(app);
    else if (route.page === 'dashboard') await renderDashboard(app);
    else if (route.page === 'project') await renderProject(app, route.projectId);
    else if (route.page === 'day') await renderDay(app, route.projectId, route.dayId);
  } catch (err) {
    console.error(err);
    app.innerHTML = '<div class="container"><div class="card"><h2>Error</h2><p>' + err.message + '</p></div></div>';
  }
}

function userMenuHTML() {
  const user = window.Clerk.user;
  const avatarUrl = user.imageUrl;
  const name = user.fullName || user.primaryEmailAddress?.emailAddress || 'User';
  return `<div class="user-menu">
    ${currentUser?.isAdmin ? '<a class="admin-link" href="#/admin/users"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1a2.5 2.5 0 0 0-2.5 2.5v1A2.5 2.5 0 0 0 8 7a2.5 2.5 0 0 0 2.5-2.5v-1A2.5 2.5 0 0 0 8 1z"/><path d="M3 14v-1a5 5 0 0 1 10 0v1"/></svg> Admin</a>' : ''}
    <img class="user-avatar" src="${avatarUrl}" alt="">
    <span class="user-name">${esc(name)}</span>
    <button class="sign-out-btn" onclick="signOut()">Sign out</button>
  </div>`;
}

function impersonateBannerHTML() {
  if (!impersonatingUserId) return '';
  return `<div class="impersonate-banner">
    Viewing as user ${esc(impersonatingUserId)}
    <button onclick="stopImpersonating()">Exit</button>
  </div>`;
}

async function signOut() {
  await window.Clerk.signOut();
  window.location.href = '/login.html';
}

function startImpersonating(userId) {
  impersonatingUserId = userId;
  navigate('#/');
}

function stopImpersonating() {
  impersonatingUserId = null;
  navigate('#/admin/users');
}

// ===== Dashboard =====
async function renderDashboard(app) {
  const projects = await api('/projects');
  if (!Array.isArray(projects)) {
    console.error('API /projects returned:', projects);
    app.innerHTML = '<div class="container"><div class="card"><h2>Error</h2><p>' + esc(projects.error || JSON.stringify(projects)) + '</p></div></div>';
    return;
  }
  const active = projects.filter(p => !p.archived);
  const completed = projects.filter(p => p.archived);

  app.innerHTML = `
    ${impersonateBannerHTML()}
    <div class="nav"><h1>DIT Report Manager</h1><div class="spacer"></div>
      <button class="btn btn-primary" onclick="createProject()">+ New Project</button>
      ${userMenuHTML()}</div>
    <div class="container">
      ${projects.length === 0 ? `
        <div class="card" style="text-align:center;padding:48px">
          <h2 style="margin-bottom:8px">No projects yet</h2>
          <p style="color:var(--text-dim);margin-bottom:16px">Create your first DIT offload report project to get started.</p>
          <button class="btn btn-primary" onclick="createProject()">+ New Project</button>
        </div>` : `

        <!-- Active Projects -->
        <div class="dashboard-section">

function toggleMenu(btn) {
  const menu = btn.nextElementSibling;
  const wasOpen = menu.classList.contains('open');
  closeAllMenus();
  if (!wasOpen) menu.classList.add('open');
}

function closeAllMenus() {
  document.querySelectorAll('.ellipsis-menu.open').forEach(m => m.classList.remove('open'));
}

// Global click-outside to close menus
document.addEventListener('click', (e) => {
  if (!e.target.closest('.ellipsis-btn')) closeAllMenus();
});

async function createProject() {
  const title = await modalPrompt('Project title:');
  if (!title) return;
  const { id } = await api('/projects', { method: 'POST', body: { title } });
  navigate('#/project/' + id);
}

async function deleteProject(id) {
  closeAllMenus();
  if (!await modalConfirm('Delete this project and all its data? This cannot be undone.')) return;
  await api('/projects/' + id, { method: 'DELETE' });
  render();
}

async function archiveProject(id, archived) {
  closeAllMenus();
  await api('/projects/' + id, { method: 'PUT', body: { archived: archived ? 1 : 0 } });
  toast(archived ? 'Project marked as complete' : 'Project reactivated');
  render();
}

async function exportHTML(id) {
  const token = await window.Clerk.session.getToken();
  const headers = { 'Authorization': `Bearer ${token}` };
  if (impersonatingUserId) headers['x-impersonate-user'] = impersonatingUserId;
  const res = await fetch(API + '/projects/' + id + '/export/html', { headers });
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (res.headers.get('Content-Disposition') || '').match(/filename="(.+)"/)?.[1] || 'report.html';
  a.click();
  URL.revokeObjectURL(url);
}

function cameraCard(c) {
  const type = c.source_type || 'camera';
  const brand = detectBrand(c.camera_name);
  const typeLabels = { camera: 'Video', audio: 'Audio', photo: 'Photo', misc: 'Misc Source' };

  let fields = '';
  const hints = {
    red:       { res: '8K 17:9', codec: 'R3D', cs: 'REDWideGamutRGB', gamma: 'Log3G10', lut: 'Rec709' },
    arri:      { res: '4.6K 3:2', codec: 'ARRIRAW', cs: 'AWG4', gamma: 'LogC4', lut: 'ALF-4 Rec709' },
    sony:      { res: '4K 16:9', codec: 'XAVC', cs: 'S-Gamut3.Cine', gamma: 'S-Log3', lut: 'LC-709TypeA' },
    canon:     { res: '6K', codec: 'Cinema RAW Light', cs: 'Cinema Gamut', gamma: 'Canon Log 2', lut: 'Rec709' },
    blackmagic:{ res: '6K', codec: 'BRAW', cs: 'Blackmagic Wide Gamut', gamma: 'BMD Film Gen5', lut: 'Rec709' },
    dji:       { res: '8K', codec: 'CinemaDNG', cs: 'D-Gamut', gamma: 'D-Log M', lut: 'Rec709' },
    nikon:     { res: '8K', codec: 'N-RAW', cs: 'N-Gamut', gamma: 'N-Log', lut: 'Rec709' },
    apple:     { res: '4K', codec: 'Apple ProRes', cs: 'Rec. 2020 HLG', gamma: 'Apple Log', lut: 'Rec709' },
  };
  const h = hints[brand] || { res: '4K 16:9', codec: 'ProRes 4444', cs: 'Rec709', gamma: 'Log', lut: 'Rec709' };
  if (type === 'camera') {
    fields = `
      <div class="full"><div class="form-group"><label>Camera</label><input value="${esc(c.camera_name)}" data-field="camera_name" data-type="camera"></div></div>
      <div class="form-group"><label>Label</label><input value="${esc(c.label)}" data-field="label" data-type="camera" placeholder="ACAM"></div>
      <div class="form-group"><label>Resolution</label><input value="${esc(c.resolution)}" data-field="resolution" data-type="camera" placeholder="e.g. ${h.res}"></div>
      <div class="form-group"><label>FPS</label><input value="${esc(c.fps)}" data-field="fps" data-type="camera" placeholder="e.g. 23.976"></div>
      <div class="form-group"><label>Codec</label><input value="${esc(c.codec)}" data-field="codec" data-type="camera" placeholder="e.g. ${h.codec}"></div>
      <div class="form-group"><label>Colorspace</label><input value="${esc(c.colorspace)}" data-field="colorspace" data-type="camera" placeholder="e.g. ${h.cs}"></div>
      <div class="form-group"><label>Gamma</label><input value="${esc(c.gamma || '')}" data-field="gamma" data-type="camera" placeholder="e.g. ${h.gamma}"></div>
      <div class="form-group"><label>LUT</label><input value="${esc(c.lut)}" data-field="lut" data-type="camera" placeholder="e.g. ${h.lut}"></div>
      <div class="form-group"><label>Audio</label><input value="${esc(c.audio)}" data-field="audio" data-type="camera" placeholder="e.g. Onboard Scratch"></div>`;
  } else if (type === 'audio') {
    fields = `
      <div class="full"><div class="form-group"><label>Device</label><input value="${esc(c.camera_name)}" data-field="camera_name" data-type="camera" placeholder="e.g. Sound Devices 888"></div></div>
      <div class="form-group"><label>Label</label><input value="${esc(c.label)}" data-field="label" data-type="camera" placeholder="SOUND"></div>
      <div class="form-group"><label>Sample Rate</label><input value="${esc(c.resolution)}" data-field="resolution" data-type="camera" placeholder="48kHz"></div>
      <div class="form-group"><label>Bit Depth</label><input value="${esc(c.codec)}" data-field="codec" data-type="camera" placeholder="24-bit"></div>
      <div class="form-group"><label>Channels</label><input value="${esc(c.audio)}" data-field="audio" data-type="camera" placeholder="8"></div>
      <div class="form-group"><label>Notes</label><input value="${esc(c.notes)}" data-field="notes" data-type="camera"></div>`;
  } else if (type === 'photo') {
    fields = `
      <div class="full"><div class="form-group"><label>Camera</label><input value="${esc(c.camera_name)}" data-field="camera_name" data-type="camera" placeholder="e.g. Canon R5"></div></div>
      <div class="form-group"><label>Label</label><input value="${esc(c.label)}" data-field="label" data-type="camera" placeholder="BTS"></div>
      <div class="form-group"><label>Format</label><input value="${esc(c.codec)}" data-field="codec" data-type="camera" placeholder="RAW / JPEG"></div>

  picker.className = 'source-picker';

    <button onclick="addCamera(${dayId}, 'audio')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg> Audio</button>
    <button onclick="addCamera(${dayId}, 'photo')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg> Photos</button>
    <button onclick="addCamera(${dayId}, 'misc')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> Misc Source</button>
  `;
  document.body.appendChild(picker);
  const rect = el.getBoundingClientRect();
  picker.style.left = (rect.left + rect.width / 2 - picker.offsetWidth / 2) + 'px';
  picker.style.top = (rect.top - picker.offsetHeight - 8) + 'px';
  if (parseFloat(picker.style.top) < 0) picker.style.top = (rect.bottom + 8) + 'px';
  const close = (e) => { if (!picker.contains(e.target) && !el.contains(e.target)) { picker.remove(); document.removeEventListener('click', close); } };
  setTimeout(() => document.addEventListener('click', close), 0);
}

// ===== Auto-save delegation =====
const saveBenchmark = debounce(async (id, field, value) => {
  await api('/benchmarks/' + id, { method: 'PUT', body: { [field]: value } });
  toast('Saved');
});

const saveCamera = debounce(async (id, field, value) => {
  await api('/cameras/' + id, { method: 'PUT', body: { [field]: value } });
  toast('Saved');
});

const saveRoll = debounce(async (id, field, value) => {
  await api('/rolls/' + id, { method: 'PUT', body: { [field]: value } });
  toast('Saved');
  // Recalc totals
  const route = getRoute();
  if (route.dayId) updateDayTotals(route.dayId);
});

document.addEventListener('input', e => {
  const row = e.target.closest('[data-id]');
  if (!row) return;
  const id = row.dataset.id;
  const field = e.target.dataset.field;
  if (!field) return;

  const numericFields = ['write_speed', 'read_speed', 'gb'];
  let value = e.target.type === 'checkbox' ? e.target.checked : e.target.value;
  if (e.target.type === 'number' || numericFields.includes(field)) value = parseFloat(value) || 0;

  // Validate timecode
  if (field === 'duration_tc') {
    const valid = /^\d{2}:\d{2}:\d{2}:\d{2}$/.test(value);
    e.target.classList.toggle('invalid', value && !valid);
  }

  if (e.target.dataset.type === 'camera') saveCamera(id, field, value);
  else if (e.target.closest('#benchTable')) saveBenchmark(id, field, value);
  else if (e.target.closest('#rollsTable')) saveRoll(id, field, value);
});

async function updateDayTotals(dayId) {
  const day = await api('/days/' + dayId);
  const nonBreak = day.rolls.filter(r => !r.is_break);
  const totalGb = nonBreak.reduce((s, r) => s + (r.gb || 0), 0);
  const totalFrames = nonBreak.reduce((s, r) => s + (r.frames || 0), 0);
  // Sum timecodes client-side
  const tcs = nonBreak.map(r => r.duration_tc).filter(t => t && /^\d{2}:\d{2}:\d{2}:\d{2}$/.test(t));
  const totalDuration = sumTC(tcs);

  const el = document.getElementById('dayTotals');
  if (el) {
    el.innerHTML = `
      <div><div class="t-label">Total Data</div><div class="t-value">${fmtNum(totalGb)} GB</div></div>
      <div><div class="t-label">Total Duration</div><div class="t-value">${totalDuration}</div></div>
      <div><div class="t-label">Rolls</div><div class="t-value">${nonBreak.length}</div></div>`;
  }
}

function sumTC(tcs) {
  let h=0, m=0, s=0, f=0;
  for (const tc of tcs) {
    const p = tc.split(':').map(Number);
    h += p[0]; m += p[1]; s += p[2]; f += p[3];
  }
  s += Math.floor(f / 24); f = f % 24;
  m += Math.floor(s / 60); s = s % 60;
  h += Math.floor(m / 60); m = m % 60;
  const pad = n => String(n).padStart(2, '0');
  return `${pad(h)}:${pad(m)}:${pad(s)}:${pad(f)}`;
}

function esc(s) {
  if (!s && s !== 0) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function detectBrand(name) {
  const n = (name || '').toUpperCase();
  const brands = {
    red: ['V-RAPTOR','KOMODO','RED ONE','EPIC-X','EPIC-W','EPIC-M','SCARLET-W','SCARLET-X','RAVEN','WEAPON','MONSTRO','HELIUM','GEMINI','DRAGON','RANGER','DSMC','RED EPIC','RED SCARLET','RED RAVEN','RED RANGER','KOMODO-X'],
    arri: ['ALEXA','AMIRA','ARRICAM','ARRIFLEX'],
    blackmagic: ['URSA','BMPCC','PYXIS','POCKET CINEMA','MICRO CINEMA','BLACKMAGIC'],
    sony: ['VENICE','BURANO','FX3','FX30','FX6','FX9','FR7','A7S','A7R','A7C','A7 IV','A7IV','A9 ','A1 ','F5 ','F55','F65','FS5','FS7','FS100','FS700','CINEALTA','HDW-F'],
    canon: ['C70','C80','C100','C200','C300','C400','C500','C700','R5 C','R5C','EOS C','CINEMA EOS','1D C','1DC'],
    dji: ['RONIN','ZENMUSE','INSPIRE','MAVIC','OSMO','AVATA','AIR 2S','MINI 3','MINI 4','DJI ACTION'],
    nikon: ['NIKON Z','Z5','Z6','Z7','Z8','Z9','Z30','Z50',' ZR',' ZF',' ZFC'],
    apple: ['IPHONE','IPAD'],
  };
  for (const [brand, keywords] of Object.entries(brands))
    if (keywords.some(k => n.includes(k))) return brand;
  return null;
}

  const date = u.created_at ? new Date(u.created_at).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }) : '';

    <td style="color:var(--text-dim)">${date}</td>
    <td class="actions">
      <button class="btn btn-sm" onclick="editAdminUser('${esc(u.id)}')">Edit</button>
      <button class="btn btn-sm" onclick="startImpersonating('${esc(u.id)}')">View as</button>
      <button class="btn btn-sm btn-danger" onclick="deleteAdminUser('${esc(u.id)}')">Delete</button>

}

async function editAdminUser(userId) {
  const user = await api('/admin/users/' + userId);
  const overlay = showModal(`
    <h3>Edit User</h3>
    <div style="margin-bottom:12px;color:var(--text-dim);font-size:13px">${esc(user.email)}</div>
    <div class="form-grid" style="margin-bottom:20px">
      <div class="form-group"><label>Name</label><input id="editUserName" value="${esc(user.name || '')}"></div>
      <div class="form-group"><label>Company</label><input id="editUserCompany" value="${esc(user.company || '')}"></div>
      <div class="form-group"><label>Subscription</label>
        <select id="editUserSub">
          <option value="free" ${user.subscription_status === 'free' ? 'selected' : ''}>Free</option>
          <option value="pro" ${user.subscription_status === 'pro' ? 'selected' : ''}>Pro</option>
          <option value="enterprise" ${user.subscription_status === 'enterprise' ? 'selected' : ''}>Enterprise</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn modal-cancel">Cancel</button>
      <button class="btn btn-primary modal-ok">Save</button>
    </div>
  `);
  overlay.querySelector('.modal-cancel').addEventListener('click', () => closeModal(overlay));
  overlay.querySelector('.modal-ok').addEventListener('click', async () => {
    await api('/admin/users/' + userId, {
      method: 'PUT',
      body: {
        name: document.getElementById('editUserName').value,
        company: document.getElementById('editUserCompany').value,
        subscription_status: document.getElementById('editUserSub').value,
      }
    });
    closeModal(overlay);
    toast('User updated');
    render();
  });
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(overlay); });
}

async function deleteAdminUser(userId) {
  if (!await modalConfirm('Delete this user and ALL their projects? This cannot be undone.')) return;
  await api('/admin/users/' + userId, { method: 'DELETE' });
  toast('User deleted');
  render();
}
